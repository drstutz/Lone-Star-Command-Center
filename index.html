<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lone Star Command Center</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    header {
      background: #0f1f3d;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    .logo-star {
      width: 42px;
      height: 42px;
    }

    header h1 {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    header p {
      color: rgba(255,255,255,0.6);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .section-label {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8896a5;
      margin-bottom: 28px;
    }

    .tiles-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .tile {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 36px 28px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      width: 220px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .tile:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.13);
      border-color: #0f1f3d;
    }

    .tile-icon {
      font-size: 2.4rem;
      margin-bottom: 0;
    }

    .tile-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f1f3d;
      margin-bottom: 6px;
    }

    .tile-role {
      font-size: 0.78rem;
      color: #8896a5;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .tile.d1 {
      border-color: #c0392b22;
      background: linear-gradient(135deg, #fff 80%, #fff5f5);
    }

    .tile.d1:hover {
      border-color: #c0392b;
    }

    .tile.d1 .tile-name {
      color: #c0392b;
    }

    .divider {
      width: 60px;
      height: 3px;
      background: #0f1f3d22;
      border-radius: 2px;
      margin: 0 auto 32px;
    }
  </style>
</head>
<body>

<header>
  <div style="background:white;border-radius:10px;padding:3px;display:flex;box-shadow:0 1px 4px rgba(0,0,0,.3);"><img src="/star-logo.png" alt="Lone Star Chiro" style="height:48px;width:48px;display:block;border-radius:7px;"></div>
  <div>
    <h1>Lone Star Command Center</h1>
    <p>Lone Star Chiropractic — Internal Use Only</p>
  </div>
</header>

<main>
  <p class="section-label">Select Your Dashboard</p>

  <div class="tiles-row">
    <a class="tile" href="/maddy-cc-v2">
      <div class="tile-icon"><img src="/star-logo.png" alt="★" style="height:54px;width:54px;display:block;margin:0 auto 14px;border-radius:8px;"></div>
      <div class="tile-name">Maddy</div>
      <div class="tile-role">Front Desk</div>
    </a>

    <a class="tile" href="/sabrina-cc-v2">
      <div class="tile-icon"><img src="/star-logo.png" alt="★" style="height:54px;width:54px;display:block;margin:0 auto 14px;border-radius:8px;"></div>
      <div class="tile-name">Sabrina</div>
      <div class="tile-role">Office Manager</div>
    </a>

    <a class="tile" href="/drstutz-cc-v2">
      <div class="tile-icon"><img src="/star-logo.png" alt="★" style="height:54px;width:54px;display:block;margin:0 auto 14px;border-radius:8px;"></div>
      <div class="tile-name">Dr. Stutz</div>
      <div class="tile-role">Chiro</div>
    </a>
  </div>

  <div class="divider"></div>
  <p class="section-label">Patient Workflow</p>

  <div class="tiles-row">
    <a class="tile d1" href="/d1-recon">
      <div class="tile-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" style="height:54px;width:86px;display:block;margin:0 auto 14px;">
  <!-- left lens barrel -->
  <rect x="2" y="10" width="22" height="14" rx="5" fill="#8b0000"/>
  <!-- right lens barrel -->
  <rect x="40" y="10" width="22" height="14" rx="5" fill="#8b0000"/>
  <!-- bridge -->
  <rect x="24" y="14" width="16" height="6" rx="3" fill="#a00"/>
  <!-- left lens ring -->
  <circle cx="13" cy="27" r="12" fill="#c0392b"/>
  <circle cx="13" cy="27" r="9" fill="#1a1a2e"/>
  <circle cx="13" cy="27" r="6" fill="#2c3e7a" opacity=".8"/>
  <circle cx="10" cy="24" r="2" fill="rgba(255,255,255,.35)"/>
  <!-- right lens ring -->
  <circle cx="51" cy="27" r="12" fill="#c0392b"/>
  <circle cx="51" cy="27" r="9" fill="#1a1a2e"/>
  <circle cx="51" cy="27" r="6" fill="#2c3e7a" opacity=".8"/>
  <circle cx="48" cy="24" r="2" fill="rgba(255,255,255,.35)"/>
</svg></div>
      <div class="tile-name">D1 Recon</div>
      
    </a>
  </div>
</main>

</body>
</html>
